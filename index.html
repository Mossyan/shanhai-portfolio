<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灞辨捣蹇楀紓 | AI婕墽浣滃搧闆?/title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d0d0f;
      --bg-card: #161618;
      --bg-card-hover: #1e1e21;
      --border: #2a2a2e;
      --border-bright: #3d3d42;
      --text-primary: #f0ede6;
      --text-secondary: #8a8a8f;
      --text-muted: #555560;
      --gold: #c8a96e;
      --gold-dim: rgba(200,169,110,0.15);
      --gold-glow: rgba(200,169,110,0.08);
      --accent-blue: #5b8dd9;
      --accent-red: #e05c5c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* 椤堕儴瀵艰埅 */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(13,13,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.1em;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text-primary); }
    .nav-author {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .nav-author span { color: var(--gold); }

    /* 閫氱敤瀹瑰櫒 */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }
    section { padding: 6rem 0; }

    /* 鍒嗗壊绾?*/
    .section-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .section-title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }
    .section-desc {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 600px;
      margin-bottom: 3rem;
    }
    .divider {
      width: 40px; height: 2px;
      background: var(--gold);
      margin: 0 0 3rem;
    }

    /* ==================== 灏侀潰鍖?==================== */
    #cover {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      padding: 6rem 2rem 4rem;
    }

    .cover-image-wrap {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin-bottom: 3rem;
      border-radius: 12px;
      overflow: hidden;
    }

    .cover-image-wrap img {
      width: 100%;
      display: block;
    }

    .cover-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg-card);
      border: 2px dashed var(--border-bright);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .cover-placeholder .icon { font-size: 2.5rem; opacity: 0.4; }
    .cover-placeholder strong { color: var(--gold); font-weight: 500; }

    .cover-title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .cover-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
    }
    .cover-tags {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .tag {
      padding: 0.3rem 0.9rem;
      border: 1px solid var(--border-bright);
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--bg-card);
    }
    .cover-author {
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .cover-author span { color: var(--gold); }

    /* ==================== 瑙掕壊灞曠ず ==================== */
    #characters { background: var(--bg-primary); }

    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
    }

    .char-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }
    .char-card:hover {
      border-color: var(--border-bright);
      transform: translateY(-4px);
    }

    .char-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--bg-card-hover);
    }
    .char-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .char-placeholder {
      width: 100%;
      aspect-ratio: 3/4;
      background: var(--bg-card-hover);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .char-placeholder .icon { font-size: 2rem; opacity: 0.3; }
    .char-placeholder strong { color: var(--gold); }

    .char-badge {
      position: absolute;
      top: 1rem; right: 1rem;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
    }
    .badge-protagonist { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold); }
    .badge-supporting { background: rgba(91,141,217,0.15); color: var(--accent-blue); border: 1px solid var(--accent-blue); }
    .badge-antagonist { background: rgba(224,92,92,0.15); color: var(--accent-red); border: 1px solid var(--accent-red); }

    .char-info { padding: 1.5rem; }
    .char-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }
    .char-name-en {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }
    .char-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .char-ability {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .char-ability span { color: var(--gold); }

    /* ==================== 涓栫晫瑙傝瀹?==================== */
    #world { background: var(--bg-card); }
    .world-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
    }
    .world-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .world-card-img {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg-card-hover);
      border-bottom: 1px solid var(--border);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .world-card-img .icon { font-size: 1.5rem; opacity: 0.3; }
    .world-card-img strong { color: var(--gold); }
    .world-card-body { padding: 1.5rem; }
    .world-card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }
    .world-card-text {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .power-system {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
    }
    .power-system h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.1rem;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
    .power-list { list-style: none; display: flex; flex-direction: column; gap: 1rem; }
    .power-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }
    .power-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 0.5rem;
      flex-shrink: 0;
    }
    .dot-gold { background: var(--gold); }
    .dot-blue { background: var(--accent-blue); }
    .dot-red { background: var(--accent-red); }
    .power-name { font-size: 0.9rem; font-weight: 500; color: var(--text-primary); }
    .power-desc { font-size: 0.8rem; color: var(--text-secondary); }

    /* ==================== 鍒嗛暅鑴氭湰 ==================== */
    #storyboard { background: var(--bg-primary); }

    .episodes { display: flex; flex-direction: column; gap: 2rem; }
    .episode-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.3rem;
      color: var(--gold);
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .story-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .frame-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .frame-card:hover { border-color: var(--border-bright); }

    .frame-img {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg-card-hover);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .frame-img .icon { font-size: 1.2rem; opacity: 0.25; }
    .frame-img strong { color: var(--text-secondary); }

    .frame-body { padding: 1rem 1.25rem; }
    .frame-num {
      font-size: 0.7rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    .frame-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 0.5rem; }
    .frame-dialogue {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
      padding-left: 0.75rem;
      border-left: 2px solid var(--border);
    }

    /* ==================== AI鎻愮ず璇?==================== */
    #prompts { background: var(--bg-card); }
    .prompt-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .prompt-tab {
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .prompt-tab.active, .prompt-tab:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-glow);
    }
    .prompt-set { display: none; }
    .prompt-set.active { display: block; }

    .prompt-list { display: flex; flex-direction: column; gap: 1.5rem; }
    .prompt-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .prompt-header {
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .prompt-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.05em;
    }
    .prompt-type-badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid rgba(200,169,110,0.3);
    }
    .prompt-body { padding: 1rem 1.25rem; }
    .prompt-text {
      font-size: 0.825rem;
      color: var(--text-secondary);
      line-height: 1.8;
      font-family: 'Courier New', monospace;
      word-break: break-all;
    }
    .prompt-copy {
      margin-top: 0.75rem;
      padding: 0.4rem 0.9rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .prompt-copy:hover { border-color: var(--gold); color: var(--gold); }

    /* ==================== 鑱旂郴鎴?==================== */
    #contact { background: var(--bg-primary); text-align: center; }
    .contact-text {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }
    .contact-links { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
    .contact-link {
      padding: 0.75rem 2rem;
      border: 1px solid var(--border-bright);
      border-radius: 8px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .contact-link:hover { border-color: var(--gold); color: var(--gold); }

    /* 鍔ㄧ敾 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    section > * { animation: fadeInUp 0.6s ease both; }

    /* 鍝嶅簲寮?*/
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .world-grid { grid-template-columns: 1fr; }
      .char-grid { grid-template-columns: 1fr; }
      .story-grid { grid-template-columns: 1fr; }
    }

    /* 鍥剧墖鏇挎崲璇存槑 */
    .img-replace-note {
      background: var(--gold-dim);
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin: 2rem auto;
      max-width: 700px;
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .img-replace-note strong { color: var(--gold); }
  </style>
</head>
