<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山海志异 - AI 漫剧</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f5e6c8;font-family:"Noto Serif SC",serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.hero{text-align:center;margin-bottom:40px}
.hero h1{font-size:3em;color:#d4af37;text-shadow:0 0 30px rgba(212,175,55,0.5);letter-spacing:0.3em}
.hero p{color:#888;font-size:1.1em;margin-top:10px}
.video-wrapper{width:100%;max-width:960px;margin-bottom:60px}
video{width:100%;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,0.8)}
.episodes{width:100%;max-width:960px}
.episodes h2{color:#d4af37;border-bottom:1px solid #333;padding-bottom:10px;margin-bottom:30px;font-size:1.5em}
.episode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.ep-card{background:#151515;border:1px solid #2a2a2a;border-radius:8px;overflow:hidden;transition:transform 0.2s,border-color 0.2s}
.ep-card:hover{transform:translateY(-3px);border-color:#d4af37}
.ep-card img{width:100%;height:160px;object-fit:cover}
.ep-info{padding:15px}
.ep-title{font-size:1.1em;color:#d4af37;margin-bottom:5px}
.ep-desc{color:#777;font-size:0.9em;line-height:1.5}
footer{margin-top:60px;color:#444;font-size:0.85em;text-align:center}
footer a{color:#666;text-decoration:none}footer a:hover{color:#d4af37}
</style>
</head>
<body>
<div class="hero"><h1>山海志异</h1><p>青丘之约 &middot; 命运齿轮 &middot; AI 漫剧</p></div>

<div class="episodes"><h2>角色介绍</h2>
<div class="episode-grid">
<div class="ep-card"><img src="characters/tushan_2k.jpg" alt="涂山九"><div class="ep-info"><div class="ep-title">涂山九</div><div class="ep-desc">青丘狐族最后的血脉，承载千年使命的少女</div></div></div>
<div class="ep-card"><img src="characters/shanhei_2k.jpg" alt="山魈"><div class="ep-info"><div class="ep-title">山魈</div><div class="ep-desc">神秘的山野行者，掌握上古秘术的隐士</div></div></div>

<div class="ep-card"><img src="characters/world_best.jpg" alt="山海世界"><div class="ep-info"><div class="ep-title">山海世界</div><div class="ep-desc">昆仑墟之上，人神妖共存的奇幻世界</div></div></div>
</div></div>
