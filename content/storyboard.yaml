# ============================================
# 第一话分镜脚本
# ============================================
episode_title: "第一话 · 破界之逃"
episode_desc: "选题：一个现代人穿越进入《山海经》世界，发现自己的修复工作能真正改变这个世界的命运。"
episode_num: 1

# 每一帧（frame_img留空表示"待配图"）
frames:

  - num: 1
    img: ""    # 帧1图片文件名，如 "frame_01.jpg"，留空则显示占位符
    desc: "特写：古籍修复师正在修复一卷泛黄的《山海经》残卷，笔尖轻轻划过，蚂蚁般大小的古籍逐渐恢复原貌。窗外是现代城市的钢筋混凝土，反差强烈。"
    dialogue: "旁白：我是林溪，山海经遗迹馆的修复员。我的工作，是让那些被时间遗忘的文字，重新被人看见。"

  - num: 2
    img: ""
    desc: "古籍师用笔尖交错修补空隙——古籍中有一个不规则的空洞，边缘若被热笔。"
    dialogue: "古籍师：这儿……热笔\"不是天灾造成的。更像是……在\"后退\"？"

  - num: 3
    img: ""
    desc: "古籍师用手轻按空洞边缘。刹那间，她的手指穿过纸面，像穿过水面——周围的世界开始崩解。"
    dialogue: "（无对白）：视觉冲击：现代世界淡化成文字和空白。"

  - num: 4
    img: ""
    desc: "切换镜头：山海经世界——林溪整个人被卷入\"文字漩涡\"，周围的世界是山水画，是活的。"
    dialogue: "（无对白）：镜头拉远，展示穿越的宏大尺度感。参考传统山水画。"

  - num: 5
    img: ""
    desc: "转场：大远景，昆仑山脊。云雾缭绕的巨型山脊，隐约可见的神庙轮廓，天空中隐约可见神兽返航。"
    dialogue: "旁白：后来我才知道，我修复的不只是书——而是一个世界。"

  - num: 6
    img: ""
    desc: "林溪从半空中掉落，被一只毛茸茸的手抓住手腕，拖到岩石上。抬头，看到涂山九倒挂着看她，九条尾巴在身后悠然地摇。"
    dialogue: "涂山九：又一个人间来的？/ 等等，频率越来越高了……第一次，地球的来访频率越来越高了。"

  - num: 7
    img: ""
    desc: "林溪回头，看见自己身上的衬衫已经变成古袍（无缝转变），手指间还有未消散的金色光粒——文字觉醒的痕迹。"
    dialogue: "林溪：这是……《山海经》的世界？那本书……那本我正在修复的书！"

  - num: 8
    img: ""
    desc: "涂山九神色一变，站起来警戒。远处传来恶狠的声音——是空中碎裂成碎片的文字。"
    dialogue: "涂山九：不好，是蚀文！/ 第一次来就遇到它，小修复员，你的频率真是高得离谱！"

  - num: 9
    img: ""
    desc: "林溪慌张地伸手去抓地上的岩石，空中飘来一段古文字——是《山海经》残卷中的文字，第一次觉醒——一串金色文字从她手掌中浮现，形成屏障挡住蚀文攻击。"
    dialogue: "林溪：发现自己有能力：原来——文\"活了\"？"

  - num: 10
    img: ""
    desc: "涂山九吹响灵笛，制止了蚀文追击。回头看林溪，神色复杂。"
    dialogue: "涂山九：怎样，有兴趣吗，小修复员？/ 看起来你不是普通人，小修复员……"

  - num: 11
    img: ""
    desc: "林溪看着手掌中残留的文字光粒，又看看周围的山海世界：这不是梦。她接受了。"
    dialogue: "林溪：我的工作，是让那些被时间遗忘的文字，重新被看见。那现在……就包括这个世界。"

  - num: 12
    img: ""
    desc: "定格画面：林溪（金光闪烁）与涂山九（狐尾飘舞）背靠背伫立，身后是崩坏的昆仑墟与袭来的黑暗文字洪流。"
    dialogue: "标题出现：《山海志异》第一话·破界之逃·完。"
