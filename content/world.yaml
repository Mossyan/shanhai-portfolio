# ============================================
# 世界观设定
# ============================================
world_entries:

  - id: kunlun
    title: "昆仑墟"
    img: "img/world_kunlun.jpg"   # 改成你的图片
    text: >
      天界废墟，山海经世界的中心。残破的宫殿、崩塌的玉阶、仍在运转的上古机关。
      这里是"文气"最浓郁的地方，也是蚀文侵蚀最严重的区域。
      废墟中仍存活的机关守卫，会本能攻击一切靠近者——除非你能读懂它们的铭文。

  - id: qingqiu
    title: "青丘 · 狐族领地"
    img: "img/world_qingqiu.jpg"   # 改成你的图片
    text: >
      九尾狐族的故乡，与人间相邻却又隔绝的奇妙空间。常年桃花盛开，
      有特殊的结界保护外界干扰。青丘狐族与《山海经》世界有古老的契约关系。

# ============================================
# 文气体系
# ============================================
powers:

  - name: "文炁"
    desc: "用文字沟通万物的能力（修复者的基础能力）"
    dot_color: "gold"

  - name: "剑炁"
    desc: "用文字攻击/防御（战斗系能力）"
    dot_color: "blue"

  - name: "理炁"
    desc: "与世界中的玉壁建立链接（最高阶能力），能短暂获得上古守护者的部分记忆与力量"
    dot_color: "red"
